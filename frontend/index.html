<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ToDoList</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
  </head>
  <body>
    <nav class="navbar navbar-expand-lg bg-dark navbar-dark">
        <div class="container"><p class="navbar-brand">ToDoList</p></div>
    </nav>
    <div class="container">
        <h1>Pendings</h1>
        <div class="row">
            <div class="col-sm-12 d-flex justify-content-center align-items-center" style="height: 20vh;">
                <div class="input-card">
                    <input id = "task-input" class="input-task" placeholder="Add a new task">
                    <button id = "addTask" class="btn btn-success">add task</button>
                </div>
            </div>
            <div class="row">
                <ul id = "task-list" class="task-list ms-3">
                    
                </ul>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
